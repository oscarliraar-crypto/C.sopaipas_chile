<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#060D2E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sopaipas"/>
<meta name="description" content="App oficial del clan sopaipas_chile"/>
<link rel="manifest" href="./manifest.json"/>
<!-- Icono para iOS (usa emoji como fallback) -->
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>⚔️ sopaipas_chile</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #FFD700;
  --gold-dark: #a87c00;
  --blue-deep: #060D2E;
  --blue-mid: #0D1B5E;
  --white: #FFFFFF;
  --grey: #8899bb;
  --red: #ff5555;
  --teal: #00e5c8;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Rajdhani', sans-serif;
  background: var(--blue-deep);
  color: var(--white);
  min-height: 100vh;
  /* Espacio para notch/safe area en iPhone */
  padding-bottom: calc(65px + env(safe-area-inset-bottom));
  padding-top: env(safe-area-inset-top);
}
.header {
  padding: 14px 16px 10px;
  background: linear-gradient(135deg, #0a1540, #0d1b5e);
  border-bottom: 2px solid var(--gold-dark);
  text-align: center;
}
.header h1 {
  margin: 0;
  font-family: 'Cinzel Decorative', serif;
  font-size: 17px;
  color: var(--gold);
  letter-spacing: 2px;
  text-shadow: 0 0 12px rgba(255,215,0,0.4);
}
.header p { margin: 3px 0 0; font-size: 12px; color: var(--grey); letter-spacing: 1px; }

.page { display: none; padding: 10px 8px; }
.page.active { display: block; }

.estado { margin-top: 50px; color: var(--grey); text-align: center; font-size: 15px; line-height: 2; }
.estado.error { color: var(--red); }

.spinner {
  border: 3px solid rgba(255,255,255,0.12);
  border-top: 3px solid var(--gold);
  border-radius: 50%;
  width: 22px; height: 22px;
  animation: spin 0.85s linear infinite;
  display: inline-block; vertical-align: middle; margin-left: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.seccion-titulo {
  font-family: 'Cinzel Decorative', serif;
  font-size: 11px; color: var(--gold); letter-spacing: 2px;
  text-transform: uppercase; padding: 8px 4px 6px;
  border-bottom: 1px solid rgba(255,215,0,0.15); margin-bottom: 10px;
}
.card {
  background: linear-gradient(135deg, #0f1e6a, #0a1540);
  border: 1px solid rgba(255,215,0,0.1);
  margin: 7px 0; padding: 12px 14px; border-radius: 10px;
}
.card:hover { border-color: rgba(255,215,0,0.3); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.card-name { font-size: 15px; font-weight: 700; }
.card-role { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.5px; }
.role-lider   { background: rgba(255,215,0,0.15);  color: var(--gold); border: 1px solid var(--gold-dark); }
.role-colider { background: rgba(0,229,200,0.12);  color: var(--teal); border: 1px solid #009e8a; }
.role-anciano { background: rgba(100,149,237,0.15); color: #7eb8ff; border: 1px solid #3a6ccc; }
.role-miembro { background: rgba(255,255,255,0.06); color: var(--grey); border: 1px solid #2a3a6a; }
.card-stats { display: flex; gap: 14px; font-size: 13px; color: var(--grey); flex-wrap: wrap; }
.stat-val { color: var(--white); font-weight: 700; }

.ranking-item {
  display: flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #0f1e6a, #0a1540);
  border: 1px solid rgba(255,215,0,0.1); border-radius: 10px;
  padding: 10px 14px; margin: 6px 0;
}
.rank-pos { font-family: 'Cinzel Decorative', serif; font-size: 17px; font-weight: 900; min-width: 30px; text-align: center; }
.rank-1 { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
.rank-2 { color: #C0C0C0; }
.rank-3 { color: #CD7F32; }
.rank-n { color: var(--grey); font-size: 13px; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-sub  { font-size: 11px; color: var(--grey); }
.rank-val  { font-size: 16px; font-weight: 700; color: var(--gold); text-align: right; white-space: nowrap; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.stat-box {
  background: linear-gradient(135deg, #0f1e6a, #0a1540);
  border: 1px solid rgba(255,215,0,0.12); border-radius: 10px; padding: 14px 10px; text-align: center;
}
.stat-box-val { font-family: 'Cinzel Decorative', serif; font-size: 20px; color: var(--gold); font-weight: 700; }
.stat-box-lbl { font-size: 11px; color: var(--grey); letter-spacing: 0.5px; margin-top: 3px; }

.war-info-box {
  background: linear-gradient(135deg, #112080, #0a1540);
  border: 1px solid rgba(255,215,0,0.25); border-radius: 10px;
  padding: 12px 14px; margin-bottom: 12px; text-align: center;
}
.war-estado-label { font-size: 11px; color: var(--grey); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
.war-estado-val { font-family: 'Cinzel Decorative', serif; font-size: 14px; color: var(--gold); }

.war-clan {
  background: linear-gradient(135deg, #0f1e6a, #0a1540);
  border: 1px solid rgba(255,215,0,0.1); border-radius: 10px; padding: 12px 14px; margin: 7px 0;
}
.war-clan.es-nuestro { border-color: rgba(255,215,0,0.4); background: linear-gradient(135deg, #1a2e90, #0d1b5e); }
.war-clan-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.war-clan-name { font-size: 14px; font-weight: 700; }
.war-clan-fame { font-size: 17px; font-weight: 700; color: var(--gold); }
.badge-nuestro { font-size: 10px; color: var(--gold); border: 1px solid var(--gold-dark); padding: 1px 7px; border-radius: 8px; margin-left: 6px; }
.war-bar-bg { background: rgba(255,255,255,0.08); border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 8px; }
.war-bar-fill { background: linear-gradient(90deg, var(--gold-dark), var(--gold)); height: 100%; border-radius: 4px; }

.war-member {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px;
}
.war-member:last-child { border-bottom: none; }
.war-member-name  { flex: 1; font-weight: 600; }
.war-member-fame  { color: var(--gold); font-weight: 700; min-width: 65px; text-align: right; }
.war-member-decks { color: var(--grey); font-size: 11px; min-width: 65px; text-align: right; }

/* Banner instalar PWA */
#bannerInstalar {
  display: none;
  background: linear-gradient(135deg, #1a2e90, #0a1540);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 10px;
  margin: 8px;
  padding: 12px 14px;
  align-items: center;
  gap: 12px;
}
#bannerInstalar.visible { display: flex; }
#bannerInstalar span { flex: 1; font-size: 13px; color: var(--grey); }
#bannerInstalar span b { color: var(--white); }
.btn-instalar {
  background: var(--gold);
  color: var(--blue-deep);
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
}
.btn-cerrar-banner {
  background: transparent;
  border: none;
  color: var(--grey);
  font-size: 18px;
  cursor: pointer;
  padding: 0 4px;
}

.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, #04091f, #0d1b5e);
  border-top: 1px solid rgba(255,215,0,0.15);
  display: flex; z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; padding: 10px 4px 8px; color: var(--grey);
  background: transparent; border: none; cursor: pointer;
  font-family: 'Rajdhani', sans-serif; font-size: 12px;
  font-weight: 600; letter-spacing: 0.3px; transition: color 0.2s;
}
.nav-btn.active { color: var(--gold); }
</style>
</head>
<body>

<div class="header">
  <h1>⚔️ sopaipas_chile</h1>
  <p id="clanSubtitulo">Conectando...</p>
</div>

<!-- Banner instalar app -->
<div id="bannerInstalar">
  <span>📲 <b>Instalar app</b> en tu celular</span>
  <button class="btn-instalar" id="btnInstalar">Instalar</button>
  <button class="btn-cerrar-banner" onclick="cerrarBanner()">✕</button>
</div>

<div id="pageRoster" class="page active">
  <div id="rosterContent" class="estado">Cargando nómina <span class="spinner"></span></div>
</div>
<div id="pageWar" class="page">
  <div id="warContent" class="estado">Cargando guerra <span class="spinner"></span></div>
</div>
<div id="pageRankings" class="page">
  <div id="rankingContent" class="estado">Cargando rankings <span class="spinner"></span></div>
</div>
<div id="pageStats" class="page">
  <div id="statsContent" class="estado">Cargando estadísticas <span class="spinner"></span></div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="navegar('Roster',this)">🛡️ Nómina</button>
  <button class="nav-btn" onclick="navegar('War',this)">⚔️ Guerra</button>
  <button class="nav-btn" onclick="navegar('Rankings',this)">🏆 Rankings</button>
  <button class="nav-btn" onclick="navegar('Stats',this)">📊 Stats</button>
</nav>

<script>
const API_KEY  = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiIsImtpZCI6IjI4YTMxOGY3LTAwMDAtYTFlYi03ZmExLTJjNzQzM2M2Y2NhNSJ9.eyJpc3MiOiJzdXBlcmNlbGwiLCJhdWQiOiJzdXBlcmNlbGw6Z2FtZWFwaSIsImp0aSI6ImIzZTVkYzIwLWIwYmMtNDc0YS1hYmI5LTkyOTk4YmYzZTIxYiIsImlhdCI6MTc3Mzk5NDQyNSwic3ViIjoiZGV2ZWxvcGVyL2ZhYTg5ODY3LTMzNGYtNzU5MC0wMTkwLTUwNTY0NTgzNTMzMCIsInNjb3BlcyI6WyJyb3lhbGUiXSwibGltaXRzIjpbeyJ0aWVyIjoiZGV2ZWxvcGVyL3NpbHZlciIsInR5cGUiOiJ0aHJvdHRsaW5nIn0seyJjaWRycyI6WyIxMDQuMjMuMjM3LjY1IiwiMTA0LjIzLjIwMi45MCIsIjE3Mi42NC4yMDUuOTkiLCIxOTguNDEuMjMwLjEwMCIsIjE3Mi42NC4xNDkuMTciXSwidHlwZSI6ImNsaWVudCJ9XX0.66as8tz8OP8jv6ObnTDco8nWakGrApXpz2sKejli4AAZXoyeK6HCq_nYQRYEbQ2LzrlIQ1eQR5kwcJnxPKE-2Q";
const CLAN_TAG = "#G09GCYPJ";
const WORKER   = "https://throbbing-hat-a67d.c08121036.workers.dev";

let clanCache = null;
let cargado   = {};
let deferredPrompt = null;

// ── SERVICE WORKER ────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(function(reg) { console.log('SW registrado:', reg.scope); })
      .catch(function(err) { console.log('SW error:', err); });
  });
}

// ── BANNER INSTALAR PWA ───────────────────────────────────
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('bannerInstalar').classList.add('visible');
});

document.getElementById('btnInstalar').addEventListener('click', function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(result) {
    console.log('Instalación:', result.outcome);
    deferredPrompt = null;
    document.getElementById('bannerInstalar').classList.remove('visible');
  });
});

window.addEventListener('appinstalled', function() {
  document.getElementById('bannerInstalar').classList.remove('visible');
  deferredPrompt = null;
});

function cerrarBanner() {
  document.getElementById('bannerInstalar').classList.remove('visible');
}

// ── NAVEGACIÓN ────────────────────────────────────────────
function navegar(pagina, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('page' + pagina).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  if (!cargado[pagina]) {
    cargado[pagina] = true;
    if (pagina === 'Roster')   cargarNomina();
    if (pagina === 'War')      cargarGuerra();
    if (pagina === 'Rankings') cargarRankings();
    if (pagina === 'Stats')    cargarStats();
  }
}

// ── API ───────────────────────────────────────────────────
async function apiCall(endpoint) {
  var tag = encodeURIComponent(CLAN_TAG);
  var cr  = "https://api.clashroyale.com/v1" + endpoint.replace('%TAG%', tag);
  var url = WORKER + "?url=" + encodeURIComponent(cr) + "&key=" + encodeURIComponent(API_KEY);
  try {
    var res = await fetch(url);
    if (!res.ok) return { error: "HTTP " + res.status };
    return await res.json();
  } catch(e) {
    return { error: "Sin conexión" };
  }
}

async function obtenerClan() {
  if (clanCache) return clanCache;
  var data = await apiCall('/clans/%TAG%');
  if (data && !data.error) {
    clanCache = data;
    document.getElementById('clanSubtitulo').textContent =
      (data.name || 'Clan') + " · " + (data.members || 0) + "/50 miembros";
  }
  return data;
}

function traducirRol(rol) {
  return { leader:'Líder', coLeader:'Colíder', elder:'Anciano', member:'Miembro' }[rol] || rol;
}
function claseRol(rol) {
  return { leader:'role-lider', coLeader:'role-colider', elder:'role-anciano', member:'role-miembro' }[rol] || 'role-miembro';
}
function mostrarError(id, msg) {
  document.getElementById(id).innerHTML =
    '<div class="estado error">❌ ' + (msg || 'Error') + '<br><small>Revisa la API Key y conexión</small></div>';
}
function rankPos(i) {
  if (i === 0) return '<span class="rank-pos rank-1">🥇</span>';
  if (i === 1) return '<span class="rank-pos rank-2">🥈</span>';
  if (i === 2) return '<span class="rank-pos rank-3">🥉</span>';
  return '<span class="rank-pos rank-n">' + (i+1) + '</span>';
}

// ── NÓMINA ────────────────────────────────────────────────
async function cargarNomina() {
  var c = document.getElementById('rosterContent');
  var data = await obtenerClan();
  if (!data || data.error) { mostrarError('rosterContent', data && data.error); return; }
  var miembros = (data.memberList || []).slice().sort(function(a,b){ return b.trophies - a.trophies; });
  c.innerHTML = '<div class="seccion-titulo">Miembros del clan (' + miembros.length + ')</div>' +
    miembros.map(function(m) {
      return '<div class="card">' +
        '<div class="card-header">' +
          '<span class="card-name">' + m.name + '</span>' +
          '<span class="card-role ' + claseRol(m.role) + '">' + traducirRol(m.role) + '</span>' +
        '</div>' +
        '<div class="card-stats">' +
          '<span>🏆 <span class="stat-val">' + m.trophies.toLocaleString('es-CL') + '</span></span>' +
          '<span>⬆️ <span class="stat-val">' + m.donations + '</span></span>' +
          '<span>⬇️ <span class="stat-val">' + m.donationsReceived + '</span></span>' +
          '<span>Nv.<span class="stat-val"> ' + m.expLevel + '</span></span>' +
        '</div>' +
      '</div>';
    }).join('');
}

// ── GUERRA ────────────────────────────────────────────────
async function cargarGuerra() {
  var c = document.getElementById('warContent');
  var data = await apiCall('/clans/%TAG%/currentriverrace');
  if (!data || data.error) { mostrarError('warContent', data && data.error); return; }
  var race   = data.clan || {};
  var clanes = (data.clans || []).slice().sort(function(a,b){ return b.fame - a.fame; });
  var maxFame = clanes.length ? clanes[0].fame : 1;
  var estado  = data.periodType === 'warDay' ? '⚔️ Día de Guerra' : '🔄 Periodo de Entrenamiento';
  var participantes = (race.participants || []).slice().sort(function(a,b){ return b.fame - a.fame; });

  var html = '<div class="war-info-box"><div class="war-estado-label">Estado actual</div>' +
    '<div class="war-estado-val">' + estado + '</div></div>' +
    '<div class="seccion-titulo">Clasificación de clanes</div>';

  clanes.forEach(function(clan) {
    var esNuestro = clan.tag === CLAN_TAG;
    var pct = Math.round((clan.fame / maxFame) * 100);
    html += '<div class="war-clan ' + (esNuestro ? 'es-nuestro' : '') + '">' +
      '<div class="war-clan-header">' +
        '<span class="war-clan-name">' + (esNuestro ? '⭐ ' : '') + clan.name +
          (esNuestro ? '<span class="badge-nuestro">NUESTRO</span>' : '') + '</span>' +
        '<span class="war-clan-fame">🔥 ' + clan.fame.toLocaleString('es-CL') + '</span>' +
      '</div>' +
      '<div class="war-bar-bg"><div class="war-bar-fill" style="width:' + pct + '%"></div></div>' +
    '</div>';
  });

  if (participantes.length) {
    html += '<div class="seccion-titulo" style="margin-top:16px">Nuestros participantes</div><div class="card">' +
      participantes.map(function(p) {
        return '<div class="war-member">' +
          '<span class="war-member-name">' + p.name + '</span>' +
          '<span class="war-member-decks">🃏 ' + (p.decksUsed || 0) + ' mazos</span>' +
          '<span class="war-member-fame">🔥 ' + (p.fame || 0).toLocaleString('es-CL') + '</span>' +
        '</div>';
      }).join('') + '</div>';
  }
  c.innerHTML = html;
}

// ── RANKINGS ──────────────────────────────────────────────
async function cargarRankings() {
  var c = document.getElementById('rankingContent');
  var data = await obtenerClan();
  if (!data || data.error) { mostrarError('rankingContent', data && data.error); return; }
  var miembros = data.memberList || [];
  var porTrofeos = miembros.slice().sort(function(a,b){ return b.trophies - a.trophies; }).slice(0,10);
  var porDon     = miembros.slice().sort(function(a,b){ return b.donations - a.donations; }).slice(0,10);

  var html = '<div class="seccion-titulo">Top trofeos</div>';
  porTrofeos.forEach(function(m,i) {
    html += '<div class="ranking-item">' + rankPos(i) +
      '<div class="rank-info"><div class="rank-name">' + m.name + '</div><div class="rank-sub">' + traducirRol(m.role) + '</div></div>' +
      '<div class="rank-val">🏆 ' + m.trophies.toLocaleString('es-CL') + '</div></div>';
  });
  html += '<div class="seccion-titulo" style="margin-top:16px">Top donaciones</div>';
  porDon.forEach(function(m,i) {
    html += '<div class="ranking-item">' + rankPos(i) +
      '<div class="rank-info"><div class="rank-name">' + m.name + '</div><div class="rank-sub">' + traducirRol(m.role) + '</div></div>' +
      '<div class="rank-val">⬆️ ' + m.donations.toLocaleString('es-CL') + '</div></div>';
  });
  c.innerHTML = html;
}

// ── STATS ─────────────────────────────────────────────────
async function cargarStats() {
  var c = document.getElementById('statsContent');
  var data = await obtenerClan();
  if (!data || data.error) { mostrarError('statsContent', data && data.error); return; }
  var miembros = data.memberList || [];
  var totalTrofeos   = miembros.reduce(function(s,m){ return s + m.trophies; }, 0);
  var promedioTrof   = miembros.length ? Math.round(totalTrofeos / miembros.length) : 0;
  var totalDon       = miembros.reduce(function(s,m){ return s + m.donations; }, 0);
  var totalRecibidas = miembros.reduce(function(s,m){ return s + m.donationsReceived; }, 0);
  var maxTrofeos     = miembros.reduce(function(max,m){ return m.trophies > max ? m.trophies : max; }, 0);
  var roles = { leader:0, coLeader:0, elder:0, member:0 };
  miembros.forEach(function(m){ if (roles[m.role] !== undefined) roles[m.role]++; });

  c.innerHTML =
    '<div class="seccion-titulo">Información del clan</div>' +
    '<div class="stats-grid">' +
      '<div class="stat-box"><div class="stat-box-val">' + (data.members||0) + '</div><div class="stat-box-lbl">Miembros</div></div>' +
      '<div class="stat-box"><div class="stat-box-val">' + (data.clanScore||0).toLocaleString('es-CL') + '</div><div class="stat-box-lbl">Puntuación</div></div>' +
      '<div class="stat-box"><div class="stat-box-val">' + promedioTrof.toLocaleString('es-CL') + '</div><div class="stat-box-lbl">Trofeos prom.</div></div>' +
      '<div class="stat-box"><div class="stat-box-val">' + maxTrofeos.toLocaleString('es-CL') + '</div><div class="stat-box-lbl">Máx. trofeos</div></div>' +
      '<div class="stat-box"><div class="stat-box-val">' + totalDon.toLocaleString('es-CL') + '</div><div class="stat-box-lbl">Donaciones</div></div>' +
      '<div class="stat-box"><div class="stat-box-val">' + totalRecibidas.toLocaleString('es-CL') + '</div><div class="stat-box-lbl">Recibidas</div></div>' +
    '</div>' +
    '<div class="seccion-titulo">Distribución de roles</div>' +
    '<div class="stats-grid">' +
      '<div class="stat-box"><div class="stat-box-val" style="color:var(--gold)">'   + roles.leader   + '</div><div class="stat-box-lbl">Líderes</div></div>' +
      '<div class="stat-box"><div class="stat-box-val" style="color:var(--teal)">'   + roles.coLeader + '</div><div class="stat-box-lbl">Colíderes</div></div>' +
      '<div class="stat-box"><div class="stat-box-val" style="color:#7eb8ff">'        + roles.elder    + '</div><div class="stat-box-lbl">Ancianos</div></div>' +
      '<div class="stat-box"><div class="stat-box-val" style="color:var(--grey)">'   + roles.member   + '</div><div class="stat-box-lbl">Miembros</div></div>' +
    '</div>' +
    (data.description ? '<div class="seccion-titulo">Descripción</div><div class="card" style="color:var(--grey);font-size:14px;line-height:1.5">' + data.description + '</div>' : '');
}

// Carga inicial
cargarNomina();
cargado['Roster'] = true;
</script>
</body>
